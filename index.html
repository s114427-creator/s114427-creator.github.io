<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>極簡經典紅藍書單系統</title>
  </head>
<body>

  <div class="global-wrapper">

    <header class="main-header">
      <h1>這裡之後放你的大標題</h1>
    </header>

    <nav class="navbar">
      <button class="nav-btn active" data-target="tab-tags">標籤挑選</button>
      <button class="nav-btn" data-target="tab-search">搜尋書目</button>
      <button class="nav-btn" data-target="tab-admin">編輯資料庫</button>
    </nav>

    <main class="content-container">

      <section id="tab-tags" class="tab-panel active">
        <div class="tags-grid">
          
          <div class="category-box">
            <div class="category-header">
              <h2>世界觀</h2>
              <div class="needle-line"></div> </div>
            <div class="tags-list">
              <button class="tag-item">無限流</button>
              <button class="tag-item">校園文</button>
              <button class="tag-item">修仙</button>
            </div>
          </div>

          <div class="category-box">
            <div class="category-header">
              <h2>甜度冰塊</h2>
              <div class="needle-line"></div>
            </div>
            <div class="tags-list">
              <button class="tag-item">全糖無刀</button>
              <button class="tag-item">有刀</button>
            </div>
          </div>

        </div>

        <div class="btn-offset-wrapper">
          <button class="btn-generate">生成書單</button>
        </div>
      </section>


      <section id="tab-search" class="tab-panel">
        <div class="search-wrapper">
          <input type="text" class="search-input" placeholder="輸入關鍵字搜尋書名或作者...">
        </div>

        <div class="book-list-container">
          <table class="book-table">
            <thead>
              <tr>
                <th>書名</th>
                <th>作者</th>
                <th>標籤</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td class="book-title">全球高考</td>
                <td class="book-author">木蘇里</td>
                <td><span class="tag-badge">無限流</span></td>
              </tr>
              <tr>
                <td class="book-title">天官賜福</td>
                <td class="book-author">墨香銅臭</td>
                <td><span class="tag-badge">有刀</span></td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>


      <section id="tab-admin" class="tab-panel">
        
        <div class="admin-auth-zone">
          <input type="password" class="auth-input" placeholder="請輸入管理員密鑰解鎖...">
          <button class="auth-btn">解鎖後台</button>
        </div>

        <div class="admin-panel-dashboard" style="display: none;">
          
          <div class="admin-section">
            <h3>新增大分類 / 小標籤</h3>
            <div class="input-group">
              <input type="text" placeholder="大分類名稱（如：商管財經）">
              <input type="text" placeholder="或小標籤名稱（如：總體經濟）">
            </div>
            <button class="admin-action-btn">確認新增資料</button>
          </div>

          <div class="admin-section">
            <h3>標籤管理（合併與刪除）</h3>
            <p class="admin-tip">請勾選要操作的標籤：</p>
            <div class="admin-checkbox-list">
              <label><input type="checkbox"> 無限流</label>
              <label><input type="checkbox"> 校園文</label>
              <label><input type="checkbox"> 有刀</label>
            </div>
            <div class="admin-actions-group">
              <button class="danger-btn">合併選取標籤</button>
              <button class="danger-btn">刪除選取標籤</button>
            </div>
          </div>

        </div>
      </section>

    </main>
  </div>

  </body>
</html>
